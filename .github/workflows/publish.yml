name: Build and publish Fava image

on:
  schedule:
    # Every Monday at 04:27 UTC. Avoid the high-load start of the hour.
    - cron: "27 4 * * 1"
  workflow_dispatch:
    inputs:
      tag:
        description: "Fava tag to build (empty means the latest tag)"
        required: false
        type: string
      force:
        description: "Rebuild the image even if this tag already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-fava-image
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repository
        uses: actions/checkout@v6

      - name: Resolve and validate Fava tag
        id: fava
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          upstream="https://github.com/beancount/fava.git"
          tag="${REQUESTED_TAG}"

          if [[ -z "${tag}" ]]; then
            tag="$({
              git ls-remote --tags --refs --sort='-version:refname' \
                "${upstream}" 'v*' || exit 1
            } | awk 'NR == 1 { sub("refs/tags/", "", $2); print $2 }')"
          fi

          if [[ ! "${tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker/Fava tag: ${tag}" >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags "${upstream}" \
            "refs/tags/${tag}" >/dev/null; then
            echo "Fava tag does not exist upstream: ${tag}" >&2
            exit 1
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "Selected ${image}:${tag}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Decide whether to publish
        id: decision
        shell: bash
        env:
          FORCE: ${{ inputs.force }}
          IMAGE: ${{ steps.fava.outputs.image }}
          TAG: ${{ steps.fava.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${FORCE}" == "true" ]]; then
            publish=true
          elif docker buildx imagetools inspect "${IMAGE}:${TAG}" >/dev/null 2>&1; then
            echo "${IMAGE}:${TAG} already exists; skipping."
            publish=false
          else
            publish=true
          fi

          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Build and publish multi-architecture image
        if: steps.decision.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FAVA_TAG=${{ steps.fava.outputs.tag }}
          tags: ${{ steps.fava.outputs.image }}:${{ steps.fava.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.fava.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
