name: Build and publish Fava image

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/publish.yml
  schedule:
    # Every Monday at 04:27 UTC. Avoid the high-load start of the hour.
    - cron: "27 4 * * 1"
  workflow_dispatch:
    inputs:
      tag:
        description: "Fava tag to build (empty means the latest tag)"
        required: false
        type: string
      force:
        description: "Rebuild the image even if this tag already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-fava-image
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repository
        uses: actions/checkout@v6

      - name: Resolve and validate Fava tag
        id: fava
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          upstream="https://github.com/beancount/fava.git"
          tag="${REQUESTED_TAG}"
          latest_tag="$({
            git ls-remote --tags --refs --sort='-version:refname' \
              "${upstream}" 'v*' || exit 1
          } | awk 'NR == 1 { sub("refs/tags/", "", $2); print $2 }')"

          if [[ -z "${tag}" ]]; then
            tag="${latest_tag}"
          fi

          if [[ ! "${tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker/Fava tag: ${tag}" >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags "${upstream}" \
            "refs/tags/${tag}" >/dev/null; then
            echo "Fava tag does not exist upstream: ${tag}" >&2
            exit 1
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          is_latest=false
          if [[ "${tag}" == "${latest_tag}" ]]; then
            is_latest=true
          fi

          {
            echo "tag=${tag}"
            echo "image=${image}"
            echo "is_latest=${is_latest}"
            echo "tags<<EOF"
            echo "${image}:${tag}"
            if [[ "${is_latest}" == "true" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "Selected ${image}:${tag}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Decide whether to publish
        id: decision
        shell: bash
        env:
          FORCE: ${{ inputs.force }}
          IMAGE: ${{ steps.fava.outputs.image }}
          TAG: ${{ steps.fava.outputs.tag }}
          IS_LATEST: ${{ steps.fava.outputs.is_latest }}
        run: |
          set -euo pipefail

          if [[ "${FORCE}" == "true" ]]; then
            publish=true
          else
            version_exists=false
            latest_exists=true

            if docker buildx imagetools inspect "${IMAGE}:${TAG}" >/dev/null 2>&1; then
              version_exists=true
            fi
            if [[ "${IS_LATEST}" == "true" ]] \
              && ! docker buildx imagetools inspect "${IMAGE}:latest" >/dev/null 2>&1; then
              latest_exists=false
            fi

            if [[ "${version_exists}" == "true" && "${latest_exists}" == "true" ]]; then
              echo "All expected tags already exist; skipping."
              publish=false
            else
              publish=true
            fi
          fi

          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Build and publish multi-architecture image
        if: steps.decision.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FAVA_TAG=${{ steps.fava.outputs.tag }}
          tags: ${{ steps.fava.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.fava.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
